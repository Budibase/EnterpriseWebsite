  <text x="1406" y="308" fill="#D88B8B" font-size="13" font-family="Courier New, monospace">"heading": "When will I</text>
  <text x="1406" y="328" fill="#D88B8B" font-size="13" font-family="Courier New, monospace">receive my login credentials?"</text>
  <text x="1406" y="350" fill="#8BD58B" font-size="13" font-family="Courier New, monospace">"body": "System credentials</text>
