  <rect x="292" y="304" width="1048" height="36" rx="6" fill="#1D63C3"/>
  <text x="320" y="327" fill="#F4F8FF" font-size="14" font-family="Arial, sans-serif">Add a JavaScript function to transform the query result.</text>
  <rect x="292" y="360" width="1048" height="340" rx="8" fill="#0B0B0B" stroke="#333333"/>
  <g fill="#A3A3A3" font-size="13" font-family="Courier New, monospace">
    <text x="304" y="384">1</text><text x="328" y="384">const sections = [];</text>
    <text x="304" y="406">2</text><text x="328" y="406">let current = null;</text>
    <text x="304" y="450">5</text><text x="328" y="450">for (const b of (data.results || [])) {</text>
    <text x="304" y="494">8</text><text x="328" y="494">heading: b[b.type].rich_text.map(t =&gt; t.plain_text).join(""),</text>
    <text x="304" y="538">12</text><text x="328" y="538">continue;</text>
    <text x="304" y="582">16</text><text x="328" y="582">if (!current || b.type !== "paragraph") continue;</text>
    <text x="304" y="626">20</text><text x="328" y="626">current.body += (current.body ? "\n" : "") + text;</text>
    <text x="304" y="670">24</text><text x="328" y="670">return sections.filter(s =&gt; s.body);</text>
  </g>
