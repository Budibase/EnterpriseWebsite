  <text x="700" y="130" fill="#D5D5D5" font-size="14" font-family="Courier New, monospace">https://api.github.com/repos/{{owner}}/{{repo}}/git/trees/{{tree_sha}}?recursive={{Binding.recursive}}</text>
  <text x="292" y="192" fill="#EDEDED" font-size="18" font-family="Arial, sans-serif">git/get-tree</text>
  <rect x="292" y="208" width="1048" height="92" rx="6" fill="#1D1D1D" stroke="#353535"/>
  <text x="304" y="230" fill="#BFBFBF" font-size="14" font-family="Arial, sans-serif">Returns a single tree using the SHA1 value or ref name for that tree.</text>
  <text x="304" y="252" fill="#BFBFBF" font-size="14" font-family="Arial, sans-serif">If truncated is true, fetch one subtree at a time with the non-recursive method.</text>
